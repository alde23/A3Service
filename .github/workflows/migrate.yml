name: Migrate

on:
  push:
    branches:
      - dev
    paths:
      - 'apps/api/prisma/**'
  workflow_dispatch: 

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma Client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Run migration
        # Explicitly pointing to the config file is the Prisma 6/7 way
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma --config=apps/api/prisma/prisma.config.ts
        env:
          # We map the direct connection to DATABASE_URL because 
          # that's likely what your prisma.config.ts is looking for.
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}